spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL # H2 데이터베이스를 PostgreSQL 모드로 설정
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트 시작 시 테이블 생성, 종료 시 삭제
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect # 테스트는 H2 데이터베이스를 사용