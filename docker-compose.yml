services:
  db:
    image: postgres:16-alpine
    container_name: coffee-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: coffee_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data